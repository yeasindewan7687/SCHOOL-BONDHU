<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        if (window.location.hostname.indexOf('www.') === 0) {
          var targetHost = window.location.hostname.substring(4);
          var newUrl = window.location.protocol + '//' + targetHost + (window.location.port ? ':' + window.location.port : '') + window.location.pathname + window.location.search + window.location.hash;
          window.location.replace(newUrl);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/webp" href="/SCHOOL-MAIN-LOGO.webp" />
    <link rel="shortcut icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo_school.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#1e3a8a" />
    <title>Child Care High School</title>
    <meta name="description" content="Welcome to Child Care High School, Gazipur. Established for Excellence. Access notices, results, attendance, and online admission." />
    <meta name="keywords" content="Child Care High School, Gazipur School, CCHS, Education" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" crossorigin="anonymous">
  </head>
  <body>
    <style>
      #app-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #0B2458 0%, #051430 70%, #020712 100%);
        z-index: 999999;
        font-family: 'Hind Siliguri', 'Inter', system-ui, -apple-system, sans-serif;
        color: #ffffff;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
      }
      .loader-container {
        max-width: 480px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .loader-logo-ring {
        position: relative;
        margin-bottom: 28px;
        display: inline-block;
      }
      .loader-logo-ring::before {
        content: '';
        position: absolute;
        top: -12px;
        left: -12px;
        right: -12px;
        bottom: -12px;
        border-radius: 50%;
        border: 2px solid rgba(234, 179, 8, 0.25);
        animation: pulse-ring 2.5s infinite ease-in-out;
      }
      .loader-logo {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        object-fit: cover;
        background: white;
        border: 3px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      }
      .arabic-heading {
        color: #38bdf8;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.15em;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(56, 189, 248, 0.2);
        padding: 5px 12px;
        border-radius: 20px;
        margin-bottom: 12px;
      }
      .main-bengali-greeting {
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(to right, #ffffff, #fef08a, #a7f3d0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 8px 0;
        letter-spacing: -0.01em;
      }
      .school-bengali-title {
        color: #6ee7b7;
        font-size: 16px;
        font-weight: 700;
        margin: 4px 0;
      }
      .school-welcome-msg {
        color: #e2e8f0;
        font-size: 18px;
        font-weight: 800;
        margin: 6px 0 12px 0;
        line-height: 1.4;
      }
      .school-english-welcome {
        color: #94a3b8;
        font-size: 11px;
        font-weight: 500;
        margin: 0 auto;
        max-width: 340px;
        font-style: italic;
      }
      .loader-progress {
        width: 180px;
        height: 3px;
        background: rgba(15, 23, 42, 0.8);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 24px;
        position: relative;
      }
      .loader-progress-bar {
        width: 100%;
        height: 100%;
        background: linear-gradient(to right, #10b981, #f59e0b, #14b8a6);
        transform: translateX(-100%);
        animation: progress-fill 2.5s infinite linear;
      }
      .loading-status-text {
        font-size: 11px;
        font-weight: 700;
        color: #10b981;
        margin-top: 8px;
        letter-spacing: 0.05em;
        animation: blink 1.2s infinite ease-in-out;
      }
      @keyframes pulse-ring {
        0% { transform: scale(0.9); opacity: 0.2; }
        50% { transform: scale(1.15); opacity: 0.7; }
        100% { transform: scale(1.3); opacity: 0; }
      }
      @keyframes progress-fill {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(0%); }
        100% { transform: translateX(100%); }
      }
      @keyframes blink {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
    <div id="root">
      <div id="app-loader">
        <div class="loader-container">
          <div class="loader-logo-ring">
            <img src="https://i.postimg.cc/Y0YYPZQ6/SCHOOL-MAIN-LOGO.webp" alt="Child Care High School" class="loader-logo" />
          </div>
          <div class="arabic-heading">﷽ بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
          <div class="main-bengali-greeting">আসসালামু আলাইকুম</div>
          <div class="school-bengali-title">চাইল্ড কেয়ার হাই স্কুল এর</div>
          <div class="school-welcome-msg">অনলাইন পোর্টাল এবং ডিজিটাল ডায়েরিতে আপনাকে স্বাগতম!</div>
          <div class="school-english-welcome">"Welcome to the Online Education & Diary Portal of Child Care High School, Gazipur."</div>
          <div class="loader-progress">
            <div class="loader-progress-bar"></div>
          </div>
          <div class="loading-status-text">পোর্টাল লোড হচ্ছে...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
